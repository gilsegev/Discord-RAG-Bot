services:
  postgres:
    image: postgres:16
    container_name: ragbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ragbot_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ragbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/00-init-databases.sql:/docker-entrypoint-initdb.d/00-init-databases.sql:ro
      - ./sql/01-ragbot-schema.sql:/docker-entrypoint-initdb.d/01-ragbot-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragbot_admin -d ragbot"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ragbot-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${N8N_PORT}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ragbot_admin
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      TZ: ${GENERIC_TIMEZONE}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: ragbot-phoenix
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PHOENIX_UI_PORT}:6006"
      - "127.0.0.1:${PHOENIX_GRPC_PORT}:4317"
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://ragbot_admin:${POSTGRES_PASSWORD}@postgres:5432/phoenix
      PHOENIX_PORT: 6006
      PHOENIX_GRPC_PORT: 4317
      PHOENIX_HOST: 0.0.0.0
      PHOENIX_DEFAULT_ADMIN_INITIAL_PASSWORD: ${PHOENIX_ADMIN_PASSWORD}
      PHOENIX_TELEMETRY_ENABLED: "false"
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: 90

  embedder:
    build:
      context: ./embedder
    container_name: ragbot-embedder
    restart: unless-stopped
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      MODEL_NAME: nomic-ai/nomic-embed-text-v1.5
      MODEL_CACHE: /models
    ports:
      - "127.0.0.1:${EMBEDDER_PORT}:8000"
    volumes:
      - embedder_model_cache:/models

  trace-emitter:
    build:
      context: ./trace-emitter
    container_name: ragbot-trace-emitter
    restart: unless-stopped
    depends_on:
      - phoenix
    environment:
      PHOENIX_OTLP_HTTP_ENDPOINT: http://phoenix:6006/v1/traces
      REQUEST_TIMEOUT_SECONDS: 5
    ports:
      - "127.0.0.1:${TRACE_EMITTER_PORT}:8001"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragbot-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_REST_PORT}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  n8n_data:
  qdrant_data:
  embedder_model_cache:

